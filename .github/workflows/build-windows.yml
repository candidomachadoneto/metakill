name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller pillow

      - name: Generate icon
        run: python create_icon.py

      - name: Install exiftool and ffmpeg via Chocolatey
        shell: pwsh
        run: |
          choco install exiftool --yes --no-progress
          choco install ffmpeg --yes --no-progress

          # Locate executables and copy to project root for PyInstaller
          $et = (Get-Command exiftool -ErrorAction Stop).Source
          $ff = (Get-Command ffmpeg  -ErrorAction Stop).Source
          Copy-Item $et -Destination "exiftool.exe"
          Copy-Item $ff -Destination "ffmpeg.exe"
          Write-Host "exiftool -> $et"
          Write-Host "ffmpeg   -> $ff"

      - name: Build with PyInstaller
        # Use Python to invoke PyInstaller so we avoid PowerShell's semicolon
        # ambiguity inside --add-binary arguments.
        run: |
          python -c "
          import subprocess, sys
          subprocess.run([
              sys.executable, '-m', 'PyInstaller',
              '--onedir', '--windowed',
              '--name', 'MetaKill',
              '--add-binary', 'exiftool.exe;.',
              '--add-binary', 'ffmpeg.exe;.',
              '--icon', 'icon.ico',
              '--clean', '--noconfirm',
              'metakill.py',
          ], check=True)
          "

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc metakill.iss
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaKill_Setup
          path: dist/MetaKill_Setup.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0
          name: MetaKill v1.0
          body: |
            ## MetaKill v1.0 — Deep Metadata Anonymizer

            Remove ALL identifying metadata from images and videos.

            **Stripped from images:** GPS, device model, serial number, EXIF/IPTC/XMP, timestamps
            **Stripped from videos:** Container metadata, encoder strings, SEI NAL units (deep mode re-encode), chapters, thumbnails

            ### Install
            Download `MetaKill_Setup.exe` → double-click → done. No Python required.

            ### System requirements
            Windows 10/11 x64
          files: dist/MetaKill_Setup.exe
          draft: false
          prerelease: false
